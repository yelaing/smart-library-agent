server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/library;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  sql:
    init:
      mode: never

agentscope:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:YOUR_DASHSCOPE_API_KEY_HERE}
    model-name: qwen-plus

  agent:
    name: "图书馆助手"
    sys-prompt: |
      你是学校图书馆的智能助手，可以用中文帮读者查书、借书、还书。
      使用 search_book 搜索图书，用 query_stock 查库存，用 borrow_book 借书，用 return_book 还书。
      回答要简洁友好，每次操作后主动询问读者是否还需要其他帮助。
