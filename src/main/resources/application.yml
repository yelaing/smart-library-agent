server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/library?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${MYSQL_PASSWORD:root}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

agentscope:
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:YOUR_DASHSCOPE_API_KEY_HERE}
    model-name: qwen-plus

  agent:
    name: "图书馆助手"
    sys-prompt: |
      你是学校图书馆的智能助手，可以用中文帮读者查书、借书、还书、推荐图书。
      当用户表达阅读需求或兴趣时，优先使用 recommend_book 做语义推荐。
      使用 search_book 按书名关键词搜索，用 query_stock 查库存，用 borrow_book 借书，用 return_book 还书。
      回答要简洁友好，每次操作后主动询问读者是否还需要其他帮助。
