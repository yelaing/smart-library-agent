<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Library Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column;
}
header {
  background: #16213e; padding: 14px 24px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #0f3460; flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 600; color: #e94560; }
header span { font-size: 12px; color: #888; }
.chat-container { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
.message { display: flex; gap: 10px; max-width: 80%; animation: fadeIn 0.3s ease; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message.assistant { align-self: flex-start; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.message.user .avatar { background: #e94560; }
.message.assistant .avatar { background: #0f3460; }
.bubble {
  padding: 12px 16px; border-radius: 16px; line-height: 1.6; font-size: 14px; word-break: break-word;
}
.message.user .bubble { background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
.message.assistant .bubble { background: #16213e; color: #e0e0e0; border-bottom-left-radius: 4px; border: 1px solid #0f3460; }
.message.assistant .bubble.streaming { border-color: #e94560; }
.input-area {
  background: #16213e; padding: 16px 24px; display: flex; gap: 12px; border-top: 1px solid #0f3460; flex-shrink: 0;
}
.input-area input {
  flex: 1; padding: 12px 18px; border-radius: 24px; border: 1px solid #0f3460; background: #1a1a2e;
  color: #e0e0e0; font-size: 14px; outline: none; transition: border 0.2s;
}
.input-area input:focus { border-color: #e94560; }
.input-area button {
  padding: 12px 24px; border-radius: 24px; border: none; background: #e94560; color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
}
.input-area button:hover { opacity: 0.85; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.loading-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #888; animation: bounce 1.4s infinite both; margin-right: 4px; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.empty-state { text-align: center; color: #555; margin-top: 40px; }
.empty-state p { margin: 6px 0; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Smart Library Agent</h1>
  <span>ReAct + AgentScope</span>
  <span style="margin-left:auto;color:#4ecca3;font-size:12px;" id="status">在线</span>
</header>
<div class="chat-container" id="chat">
  <div class="empty-state">
    <p>智能图书馆助手</p>
    <p>试试说：搜索Java相关的书 / 帮我借《Spring实战》</p>
  </div>
</div>
<div class="input-area">
  <input id="input" type="text" placeholder="输入消息，Enter 发送..." autofocus />
  <button id="sendBtn" onclick="send()">发送</button>
</div>

<script>
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
let loading = false;

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !loading) send(); });

function addMessage(role, content, isStreaming, isHtml) {
  const existing = document.querySelector('.empty-state');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const safeContent = isHtml ? content : escapeHtml(content);
  div.innerHTML = '<div class="avatar">' + (role === 'user' ? 'U' : 'AI') + '</div>'
    + '<div class="bubble' + (isStreaming ? ' streaming' : '') + '">' + safeContent + '</div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function setLoading(v) {
  loading = v;
  sendBtn.disabled = v;
  inputEl.disabled = v;
  statusEl.textContent = v ? '思考中...' : '在线';
  statusEl.style.color = v ? '#e94560' : '#4ecca3';
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || loading) return;
  inputEl.value = '';
  addMessage('user', text);
  setLoading(true);

  const msgDiv = addMessage('assistant', '<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>', true, true);
  const bubble = msgDiv.querySelector('.bubble');

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'qwen-plus', stream: true, messages: [{ role: 'user', content: text }] })
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let textBuffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      textBuffer += decoder.decode(value, { stream: true });
      const lines = textBuffer.split('\n');
      textBuffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const data = line.slice(5).trim();
        if (data === '[DONE]') continue;
        try {
          const chunk = JSON.parse(data);
          const content = chunk.choices?.[0]?.delta?.content;
          if (content) { fullText += content; bubble.textContent = fullText; }
          if (chunk.choices?.[0]?.finish_reason) bubble.classList.remove('streaming');
        } catch (e) {}
      }
      chatEl.scrollTop = chatEl.scrollHeight;
    }
    if (!fullText) bubble.textContent = '(无回复)';
    bubble.classList.remove('streaming');
  } catch (err) {
    bubble.textContent = '请求失败: ' + err.message;
    bubble.style.color = '#e94560';
  }
  setLoading(false);
}

fetch('/api/health', { method: 'POST' }).then(r => r.json()).then(d => {
  if (d.status === 'ok') statusEl.textContent = '在线';
}).catch(() => { statusEl.textContent = '离线'; statusEl.style.color = '#e94560'; });
</script>
</body>
</html>
